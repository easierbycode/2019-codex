<html>
	<head>
		<title>2019</title>
		<style>
			* {
				padding: 0;
				margin: 0;
				box-sizing: border-box;
				border: none;
				line-height: 1;
			}
			html, body {
				padding: 0;
				margin: 0;
				width: 100%;
				height: 100%;
				overflow: hidden;
				position: relative;
				background: #000 url(img/bg.jpg) no-repeat center/cover;
			}
			#canvas {
				width: 100%;
				height: 100%;
				min-height: 375px;
				position: relative;
				z-index: 1;
			}
			#frame {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				z-index: 0;
				-webkit-user-select: none;
				user-select: none;
				display: flex;
				justify-content: center;
			}
			#frame img {
				width: auto;
				height: 100%;
				padding: 0;
				margin: 0;
			}
			canvas {
				cursor: none;
				margin: auto;
				display: block;
				height: 100%;
				width: auto;
			}

			#howtoModal {
				position: fixed;
				top: 0;
				left: 0;
				z-index: 10001;
				width: 100%;
				height: 100%;
				display: none;
			}
			#howtoModal .howtoModalCover {
				position: absolute;
				width: 100%;
				height: 100%;
				top: 0;
				left: 0;
				background-color: rgba(0, 0, 0, 0.9);
			}
			#howtoModal .howtoModalContent {
				position: relative;
				text-align: center;
				overflow: auto;
				height: 100%;
				width: 90%;
				max-width: 1500px;
				margin: auto;
				-webkit-overflow-scrolling: touch;
			}
			#howtoModal .howtoModalContent img {
				display: inline-block;
				width: 100%;
			}
			#howtoModal .howtoModalCloseBtn {
				width: 34px;
				height: 34px;
				background: #fff url("img/modalCloseBtn.gif") no-repeat;
				position: absolute;
				top: 1.5%;
				right: 5%;
				cursor: pointer;
			}
			#howtoModal .howtoModalCloseBtn:hover {
				opacity: 0.5;
			}

			@media screen and (min-width: 414px) {
				canvas {
					max-height: 100% !important;
					min-height: 100%;
				}
			}
		</style>
	</head>
	<body>
		<div id="baseUrl" hidden>./</div>

		<!-- Game containers -->
		<div id="canvas"></div>
		<div id="frame"><img src="img/frame.jpg" alt=""></div>

		<div id="howtoModal">
			<div class="howtoModalCover"></div>
			<div class="howtoModalContent">
				<img src="img/howto_en.jpg" alt="">
			</div>
			<div class="howtoModalCloseBtn"></div>
		</div>

		<script>
			window.howtoModalOpen = function () {
				document.getElementById("howtoModal").style.display = "block";
			};
			window.howtoModalClose = function () {
				document.getElementById("howtoModal").style.display = "none";
			};
			document.querySelector("#howtoModal .howtoModalCloseBtn")
				.addEventListener("click", window.howtoModalClose);
			document.querySelector("#howtoModal .howtoModalCover")
				.addEventListener("click", window.howtoModalClose);
		</script>

		<script src="js/TweenMax.min.js"></script>
		<script src="js/pixi.min.js"></script>
		<script src="js/pixi-sound.js"></script>
		<script src="app_formatted.js"></script>
	</body>
</html>
